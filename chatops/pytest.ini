[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests

# Ruído interno do pytest-asyncio no Python 3.14 (`asyncio.set_event_loop_policy`
# depreciado). Não vem do código deste projeto — silenciado para a saída do
# laboratório não virar uma parede de warnings.
filterwarnings =
    ignore:'asyncio\.(get|set)_event_loop_policy' is deprecated:DeprecationWarning
